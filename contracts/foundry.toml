[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 2_000_000
via_ir = true

[rpc_endpoints]
base = "https://mainnet.base.org"
base_sepolia = "https://sepolia.base.org"
robinhood_testnet = "https://rpc.testnet.chain.robinhood.com"
# robinhood_mainnet = "<confirm mainnet RPC at docs.robinhood.com/chain before using>"

[etherscan]
base = { key = "${BASESCAN_API_KEY}", chain = 8453, url = "https://api.basescan.org/api" }

[fmt]
line_length = 100
tab_width = 4
quote_style = "double"
